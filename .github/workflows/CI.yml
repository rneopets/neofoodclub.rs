name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  cargo-fmt:
    name: "cargo fmt"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: "Install Rust toolchain"
        run: rustup component add rustfmt
      - run: cargo fmt --all --check

  cargo-clippy:
    name: "cargo clippy"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: "Install Rust toolchain"
        run: |
          rustup default nightly
          rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: "Clippy"
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  wasm-build:
    name: "wasm32 build check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: "Install Rust toolchain"
        run: |
          rustup default nightly
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: "Build neofoodclub-wasm for wasm32-unknown-unknown"
        run: cargo build -p neofoodclub-wasm --target wasm32-unknown-unknown --release

  python-tests:
    name: "Python tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: "Install Rust toolchain"
        run: rustup default nightly
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.11"
      - name: "Build Python extension"
        run: cd crates/python && uv run --with maturin maturin develop
      - name: "Run Python tests"
        run: cd crates/python && uv run --with pytest pytest tests/
